name: ci

on:
  push:
    branches-ignore:
      - "main"
    tags-ignore:
      - "*"

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod

      - run: go version

      - run: go fmt .

      - name: Patch
        run: make patch

      - uses: dominikh/staticcheck-action@9716614d4101e79b4340dd97b10e54d68234e431 # v1.4.1
        with:
          version: "2026.1"
          install-go: false

      - name: Test
        run: make test

      - name: Build
        run: make

  slack_notify:
    needs: [ci]
    timeout-minutes: 5
    runs-on: ubuntu-slim
    if: always()
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: suzu
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}
