name: release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod

      - run: go install github.com/tcnksm/ghr@latest

      - name: Patch
        run: make patch

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 make release
          GOOS=linux GOARCH=arm64 make release
          GOOS=darwin GOARCH=amd64 make release
          GOOS=darwin GOARCH=arm64 make release
          gzip dist/*

      - name: Release
        run: |
          ghr -t "${{ secrets.GITHUB_TOKEN }}" -u "${{ github.repository_owner }}" -r "suzu" --replace -n "${GITHUB_REF##*/}" -draft "${GITHUB_REF##*/}" dist/

  slack_notify:
    needs: [release]
    timeout-minutes: 5
    runs-on: ubuntu-slim
    if: always()
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: suzu
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}
